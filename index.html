<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyncMusic Pro - Sua Rádio em Tempo Real</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container">
      <!-- Barra Lateral / Status -->
      <aside class="sidebar">
        <div class="logo">
          <i class="fas fa-bolt"></i> <span>SyncMusic</span>
        </div>
        <nav id="role-selection">
          <button id="btn-central" class="nav-item active">
            <i class="fas fa-broadcast-tower"></i> Central
          </button>
          <button id="btn-ouvinte" class="nav-item">
            <i class="fas fa-headphones"></i> Ouvinte
          </button>
        </nav>
        <div class="room-info">
          <label>CÓDIGO DA SALA</label>
          <input type="text" id="room-code-input" placeholder="EX: FESTA2024" />
          <p id="status-display" class="status-offline">Offline</p>
        </div>
      </aside>

      <!-- Área Principal -->
      <main class="main-content">
        <!-- Painel Central -->
        <section id="central-panel" class="content-section active">
          <header class="section-header">
            <h2>Painel de Controle da Central</h2>
            <div class="upload-btn-wrapper">
              <button class="btn-upload">
                <i class="fas fa-cloud-upload-alt"></i> Upload MP3
              </button>
              <input type="file" id="upload-file" accept="audio/*" />
            </div>
          </header>

          <div
            class="progress-container"
            id="progress-wrapper"
            style="display: none"
          >
            <span>Enviando música...</span>
            <div class="progress-bar">
              <div id="upload-progress-fill"></div>
            </div>
          </div>

          <div class="playlist-container">
            <h3>Sua Biblioteca na Nuvem</h3>
            <ul id="playlist" class="music-list">
              <li class="empty-msg">Nenhuma música carregada.</li>
            </ul>
          </div>
        </section>

        <!-- Painel Ouvinte -->
        <section id="ouvinte-panel" class="content-section">
          <div class="empty-state">
            <i class="fas fa-satellite-dish"></i>
            <h2>Aguardando Conexão</h2>
            <p>Insira o código da sala na barra lateral e clique abaixo.</p>
            <button id="btn-connect" class="btn-main primary">
              Conectar à Transmissão
            </button>
          </div>
          <audio id="remote-audio" autoplay></audio>
        </section>
      </main>

      <!-- Player de Áudio (Fixo no Rodapé) -->
      <footer class="player-bar">
        <div class="now-playing">
          <div class="track-info">
            <strong id="current-track-name">Nenhuma música selecionada</strong>
            <small id="listener-count">0 ouvintes conectados</small>
          </div>
        </div>

        <div class="player-controls">
          <audio id="central-audio" controls crossorigin="anonymous"></audio>
          <button id="btn-start-broadcast" class="btn-broadcast">
            INICIAR LIVE
          </button>
        </div>
      </footer>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
